upstream intelligence_service {
    server intelligence-service:8000;
}

upstream content_service {
    server content-service:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/v1/intel/ {
        proxy_pass http://intelligence_service;
    }

    location /auth/ {
        proxy_pass http://intelligence_service;
    }

    location /api/v1/content/ {
        proxy_pass http://content_service;
    }

    location = /security {
        return 301 /security/;
    }

    location /security/ {
        alias /usr/share/nginx/html/security/;
        try_files $uri $uri/ /security/index.html;
    }

    location = /marketing {
        return 301 /marketing/;
    }

    location /marketing/ {
        alias /usr/share/nginx/html/marketing/;
        try_files $uri $uri/ /marketing/index.html;
    }

    location / {
        return 302 /security/;
    }
}
