# Alembic configuration for Intelligence_Service

[alembic]
# Path to migration scripts
script_location = app/db/migrations

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# Sys.path path, will be prepended to sys.path if present.
# Defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `dateutil` to the `install_requires` of the
# project or with `pip install python-dateutil`.
# timezone =

# max length of characters to apply to the
# "Slug" field.
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
# The path separator used here should be the separator specified by "version_path_separator" below.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. Note that this may be a single character, so if using a semicolon, you
# would want to leave this at the default "os" to avoid confusion with the path separator.
# version_path_separator = os  # Use os.pathsep. Default.
# version_path_separator = :   # splitlines, semicolon, colon
# version_path_separator = ;   # semicolons only
# version_path_separator = space  # spaces only

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

# SQLAlchemy database URL — read from env at runtime via env.py
# Do not set a literal URL here; env.py reads DATABASE_URL from os.environ.
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# lint with attempts to fix using "ruff" - use the exec runner, against the
# "ruff" entrypoint
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
