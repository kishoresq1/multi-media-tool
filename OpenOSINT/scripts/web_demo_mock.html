<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenOSINT</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: #0d1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

/* ─── Layout ──────────────────────────────────────────── */
#app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ─── Header ──────────────────────────────────────────── */
#header {
  flex: none;
  height: 48px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 10;
}
.header-wordmark { display: flex; align-items: center; flex: none; gap: 8px; }
.wordmark-name {
  font-family: 'Courier New', 'Menlo', monospace;
  font-weight: 500; font-size: 14px; color: #e6edf3;
}
.wordmark-version {
  font-family: 'Courier New', 'Menlo', monospace;
  font-size: 11px; color: #484f58;
}
.header-center { flex: 1; display: flex; justify-content: center; }
.backend-pill {
  font-size: 12px; padding: 3px 12px; border-radius: 9999px;
  border: 1px solid #30363d; color: #8b949e; background: transparent;
  cursor: pointer; white-space: nowrap;
}
.header-actions { display: flex; align-items: center; gap: 4px; flex: none; }
.icon-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; color: #484f58;
  background: transparent; border: none; cursor: pointer;
}
.icon-btn svg { display: block; }

/* ─── Chat area ───────────────────────────────────────── */
#chat-area { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
#chat-area::-webkit-scrollbar { width: 6px; }
#chat-area::-webkit-scrollbar-track { background: #161b22; }
#chat-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

#chat-inner {
  max-width: 672px; margin: 0 auto;
  padding: 24px 16px; min-height: 100%;
  display: flex; flex-direction: column;
}

/* ─── Empty state ─────────────────────────────────────── */
#empty-state {
  flex: 1; display: flex; flex-direction: column;
  justify-content: center; padding: 64px 0;
}
.empty-title {
  font-family: 'Courier New', 'Menlo', monospace;
  font-weight: 500; font-size: 18px; color: #e6edf3; margin-bottom: 4px;
}
.empty-subtitle { font-size: 14px; color: #484f58; margin-bottom: 32px; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; }
.suggestion-btn {
  border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px;
  font-size: 14px; color: #8b949e; background: transparent;
  cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
  font-family: inherit;
}
.suggestion-btn svg { flex-shrink: 0; }

/* ─── Messages ────────────────────────────────────────── */
#messages { display: flex; flex-direction: column; gap: 4px; padding-bottom: 16px; }

.msg-user {
  display: flex; flex-direction: column; align-items: flex-end;
  margin-bottom: 16px; animation: fadein 0.15s ease;
}
.msg-user-text {
  color: #e6edf3; font-size: 14px; line-height: 1.625;
  white-space: pre-wrap; max-width: 80%; text-align: right;
}
.msg-user-time {
  color: #484f58; font-size: 11px; margin-top: 4px;
  font-family: 'Courier New', monospace;
}

.msg-assistant { margin-bottom: 24px; animation: fadein 0.15s ease; }
.thinking-indicator {
  display: flex; align-items: center; gap: 6px;
  color: #484f58; font-size: 12px; font-family: 'Courier New', monospace;
}
.blink { animation: blink 1s step-end infinite; color: #3fb950; }
.msg-parts { display: flex; flex-direction: column; gap: 12px; }

/* Text part */
.part-text { font-size: 14px; color: #e6edf3; line-height: 1.625; }
.streaming-cursor {
  color: #3fb950; display: inline; margin-left: 2px;
  animation: blink 1s step-end infinite;
}
.part-text h1 { font-weight: 500; font-size: 15px; color: #e6edf3; margin: 0.7em 0 0.3em; }
.part-text h2 { font-weight: 500; font-size: 14.5px; color: #e6edf3; margin: 0.7em 0 0.3em; }
.part-text h3 { font-weight: 500; font-size: 14px; color: #e6edf3; margin: 0.7em 0 0.3em; }
.part-text p { margin-bottom: 0.5em; }
.part-text p:last-child { margin-bottom: 0; }
.part-text strong { color: #e6edf3; font-weight: 500; }
.part-text code {
  background: #1c2128; border: 1px solid #30363d; padding: 1px 5px;
  border-radius: 3px; font-size: 12px;
  font-family: 'Courier New', monospace; color: #3fb950;
}
.part-text ul { padding-left: 1.2em; margin-bottom: 0.5em; list-style: disc; }
.part-text li { margin-bottom: 2px; }

/* Tool card */
.tool-card {
  background: #161b22; border: 1px solid #30363d; border-radius: 6px;
  margin-bottom: 8px; overflow: hidden; animation: fadein 0.15s ease;
}
.tool-card-header {
  padding: 8px 12px; display: flex;
  align-items: center; justify-content: space-between;
}
.tool-card-left {
  display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1;
}
.tool-name {
  font-family: 'Courier New', 'Menlo', monospace;
  font-size: 12px; color: #8b949e; flex-shrink: 0;
}
.tool-input {
  font-size: 12px; color: #484f58;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tool-card-right {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 12px;
}
.tool-status { font-size: 12px; font-family: 'Courier New', monospace; }
.tool-status.running {
  color: #d29922; display: inline-flex; align-items: center; gap: 4px;
}
.tool-status.done   { color: #3fb950; }
.tool-status.error  { color: #f85149; }
.spin { animation: spin 1s linear infinite; }

.tool-copy-btn, .tool-collapse-btn {
  color: #484f58; cursor: pointer; background: none;
  border: none; padding: 2px; display: flex; align-items: center;
}
.tool-output {
  border-top: 1px solid #30363d; background: #0d1117;
  padding: 8px 12px; max-height: 256px; overflow-y: auto;
}
.tool-output::-webkit-scrollbar { width: 4px; }
.tool-output::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
.output-line {
  font-family: 'Courier New', 'Menlo', monospace;
  font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
}
.output-line.green  { color: #3fb950; }
.output-line.red    { color: #f85149; }
.output-line.yellow { color: #d29922; }
.output-line.gray   { color: #8b949e; }
.output-line.muted  { color: #484f58; }

/* ─── Input bar ───────────────────────────────────────── */
#input-bar {
  flex: none; background: #0d1117;
  border-top: 1px solid #30363d; padding: 12px 16px;
}
#input-wrap { max-width: 672px; margin: 0 auto; }
.input-box {
  border: 1px solid #30363d; border-radius: 6px;
  display: flex; align-items: flex-end;
  gap: 8px; padding: 8px 12px;
}
#chat-input {
  flex: 1; background: transparent; resize: none;
  font-size: 14px; color: #e6edf3; font-family: inherit;
  min-height: 22px; max-height: 160px; overflow-y: auto;
  outline: none; border: none; line-height: 1.625;
}
#chat-input::placeholder { color: #484f58; }
#send-btn {
  flex: none; width: 28px; height: 28px; border-radius: 6px;
  background: #3fb950; border: none; color: #0d1117;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; margin-bottom: 2px; flex-shrink: 0;
}
#send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
#send-btn svg { display: block; }

/* ─── Keyframes ───────────────────────────────────────── */
@keyframes spin   { to { transform: rotate(360deg); } }
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@keyframes blink  { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="header-wordmark">
      <span class="wordmark-name">OpenOSINT</span>
      <span class="wordmark-version">v2.15.0</span>
    </div>
    <div class="header-center">
      <button class="backend-pill">Claude Sonnet 4.5</button>
    </div>
    <div class="header-actions">
      <button class="icon-btn" title="Toggle theme">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="icon-btn" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button class="icon-btn" title="Clear">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- CHAT AREA -->
  <div id="chat-area">
    <div id="chat-inner">

      <div id="empty-state">
        <h1 class="empty-title">OpenOSINT</h1>
        <p class="empty-subtitle">AI-powered OSINT investigations. Enter a target to begin.</p>
        <div class="suggestions">
          <button class="suggestion-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22 6 12 13 2 6"/>
            </svg>
            Investigate email
          </button>
          <button class="suggestion-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Trace username
          </button>
          <button class="suggestion-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            Analyze IP
          </button>
          <button class="suggestion-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            </svg>
            Domain lookup
          </button>
        </div>
      </div>

      <div id="messages" style="display:none;"></div>

    </div>
  </div>

  <!-- INPUT BAR -->
  <div id="input-bar">
    <div id="input-wrap">
      <div class="input-box">
        <textarea
          id="chat-input"
          rows="1"
          placeholder="Investigate a target or ask a question..."
          style="height:22px;"
        ></textarea>
        <button id="send-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const chatArea   = document.getElementById('chat-area');
const emptyState = document.getElementById('empty-state');
const msgsCont   = document.getElementById('messages');
const inputEl    = document.getElementById('chat-input');

const sleep = ms => new Promise(res => setTimeout(res, ms));

function scrollBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

function getTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function lineClass(text) {
  if (!text) return 'muted';
  if (text.startsWith('[+]')) return 'green';
  if (text.startsWith('[-]') || text.startsWith('Error:')) return 'red';
  if (text.startsWith('[!]') || text.includes('HIGH ABUSE') || text.includes('⚠️')) return 'yellow';
  if (text.startsWith('[*]') || text.startsWith('[IP2Location]') || text.startsWith('[AbuseIPDB]')) return 'gray';
  return 'muted';
}

function renderMd(text) {
  let h = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`\n]+)`/g, '<code>$1</code>')
    .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
    .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br>');
  if (!h.startsWith('<h') && !h.startsWith('<ul')) h = `<p>${h}</p>`;
  return h;
}

function addUserMessage(text) {
  emptyState.style.display = 'none';
  msgsCont.style.display = 'flex';
  const div = document.createElement('div');
  div.className = 'msg-user';
  div.innerHTML = `<div class="msg-user-text">${text}</div><span class="msg-user-time">${getTime()}</span>`;
  msgsCont.appendChild(div);
  scrollBottom();
}

function addAssistantBlock() {
  const block = document.createElement('div');
  block.className = 'msg-assistant';
  const thinking = document.createElement('div');
  thinking.className = 'thinking-indicator';
  thinking.innerHTML = '<span class="blink">_</span>thinking';
  block.appendChild(thinking);
  const parts = document.createElement('div');
  parts.className = 'msg-parts';
  parts.style.display = 'none';
  block.appendChild(parts);
  msgsCont.appendChild(block);
  scrollBottom();
  return { thinking, parts };
}

function addToolCard(parts, toolName, toolInput, thinkingEl) {
  if (thinkingEl) thinkingEl.style.display = 'none';
  parts.style.display = 'flex';
  const card = document.createElement('div');
  card.className = 'tool-card';
  card.innerHTML = `
    <div class="tool-card-header">
      <div class="tool-card-left">
        <span class="tool-name">${toolName}</span>
        <span class="tool-input">${toolInput}</span>
      </div>
      <div class="tool-card-right">
        <span class="tool-status running">
          <svg class="spin" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          running
        </span>
        <button class="tool-copy-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
        <button class="tool-collapse-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>
    </div>`;
  const outputDiv = document.createElement('div');
  outputDiv.className = 'tool-output';
  outputDiv.style.display = 'none';
  card.appendChild(outputDiv);
  parts.appendChild(card);
  scrollBottom();
  return { card, outputDiv };
}

function resolveToolCard(obj, outputText, elapsed) {
  const st = obj.card.querySelector('.tool-status');
  st.className = 'tool-status done';
  st.textContent = elapsed.toFixed(1) + 's';
  obj.outputDiv.style.display = 'block';
  obj.outputDiv.innerHTML = '';
  for (const line of outputText.split('\n')) {
    const d = document.createElement('div');
    d.className = 'output-line ' + lineClass(line);
    d.textContent = line || ' ';
    obj.outputDiv.appendChild(d);
  }
  scrollBottom();
}

async function streamText(parts, mdText) {
  const textPart = document.createElement('div');
  textPart.className = 'part-text';
  parts.appendChild(textPart);
  const cursor = document.createElement('span');
  cursor.className = 'streaming-cursor';
  cursor.textContent = '|';
  const words = mdText.split(' ');
  let acc = '';
  for (let i = 0; i < words.length; i++) {
    acc += (i === 0 ? '' : ' ') + words[i];
    textPart.innerHTML = renderMd(acc);
    textPart.appendChild(cursor);
    scrollBottom();
    await sleep(22);
  }
  cursor.remove();
  textPart.innerHTML = renderMd(acc);
  scrollBottom();
}

async function typeMessage(text) {
  for (let i = 0; i <= text.length; i++) {
    inputEl.value = text.substring(0, i);
    await sleep(40);
  }
}

async function runMessage1() {
  inputEl.value = '';
  addUserMessage('investigate target@example.com');
  const { thinking, parts } = addAssistantBlock();
  await sleep(400);

  const c1 = addToolCard(parts, 'generate_dorks', 'target@example.com', thinking);
  await sleep(1200);
  resolveToolCard(c1,
    '[+] site:target@example.com\n[+] "target@example.com" filetype:pdf\n[+] inurl:target@example.com site:pastebin.com\n[+] "target" "example.com" site:linkedin.com\n[+] "target@example.com" -site:example.com\n[*] 8 dork URLs generated',
    1.2);
  await sleep(200);

  const c2 = addToolCard(parts, 'search_email', 'target@example.com', null);
  await sleep(1500);
  resolveToolCard(c2,
    '[+] Spotify       https://open.spotify.com/user/target\n[+] WordPress     https://wordpress.com/target\n[+] Gravatar      https://gravatar.com/target\n[+] Office365     account registered\n[*] Holehe scan complete — 4 accounts found',
    1.4);
  await sleep(200);

  const c3 = addToolCard(parts, 'search_breach', 'target@example.com', null);
  await sleep(1200);
  resolveToolCard(c3,
    '[!] LinkedIn (2016-05-17) — Passwords, Email addresses\n[!] Adobe (2013-10-04) — Passwords, Email addresses, Usernames\n[*] 2 breach(es) found via HaveIBeenPwned',
    1.1);
  await sleep(200);

  const c4 = addToolCard(parts, 'search_username', 'targetuser', null);
  await sleep(1600);
  resolveToolCard(c4,
    '[+] Twitter       https://twitter.com/targetuser\n[+] GitHub        https://github.com/targetuser\n[+] Reddit        https://reddit.com/u/targetuser\n[+] Instagram     https://instagram.com/targetuser\n[+] LinkedIn      https://linkedin.com/in/targetuser\n[+] YouTube       https://youtube.com/@targetuser\n[+] Pinterest     https://pinterest.com/targetuser\n[+] TikTok        https://tiktok.com/@targetuser\n[+] Twitch        https://twitch.tv/targetuser\n[+] Steam         https://steamcommunity.com/id/targetuser\n[+] Flickr        https://flickr.com/people/targetuser\n[+] Medium        https://medium.com/@targetuser\n[*] 12 accounts found via sherlock',
    2.3);
  await sleep(300);

  await streamText(parts,
    '## Investigation Report — target@example.com\n\n**Identity Footprint:** Target maintains accounts on **4 platforms** (Spotify, WordPress, Gravatar, Office365) and the username `targetuser` is active across **12 social networks** including Twitter, GitHub, Instagram, and LinkedIn.\n\n**⚠️ Breach Exposure:** Credentials appear in **2 known data breaches:**\n- LinkedIn (2016) — passwords and email addresses exposed\n- Adobe (2013) — passwords and usernames exposed\n\n**Recommendations:** Immediate credential rotation required. Enable MFA on all linked accounts. Monitor for unauthorized access attempts.'
  );
}

async function runMessage2() {
  inputEl.value = '';
  addUserMessage('check 198.51.100.1 for abuse');
  const { thinking, parts } = addAssistantBlock();
  await sleep(400);

  const c1 = addToolCard(parts, 'search_ip2location', '198.51.100.1', thinking);

  resolveToolCard(c1,
