name: openosint
services:
  - name: web
    github:
      repo: OpenOSINT/OpenOSINT
      branch: main
      deploy_on_push: true
    build_command: pip install -e ".[web]"
    run_command: openosint web --host 0.0.0.0 --port 8080 --no-browser
    environment_slug: python
    instance_size_slug: basic-xxs
    http_port: 8080
    routes:
      - path: /
    envs:
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: HIBP_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: IPINFO_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: IP2LOCATION_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SHODAN_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: VIRUSTOTAL_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CENSYS_API_ID
        scope: RUN_TIME
        type: SECRET
      - key: CENSYS_SECRET
        scope: RUN_TIME
        type: SECRET
